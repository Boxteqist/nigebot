name: Build and deploy NigeBot

on:
  push:
    branches: [ main ]

env:
  # Base app version; bump this manually when you want a major/minor change.
  BASE_VERSION: 1.5.0

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # so tags are available

      - name: Determine version
        id: version
        run: |
          # Auto-incrementing version on every deploy.
          # BASE_VERSION is defined at the workflow level above.
          VERSION="${BASE_VERSION}+build.${GITHUB_RUN_NUMBER}"
          echo "VERSION=${VERSION}" >> $GITHUB_ENV
          echo "Using version: ${VERSION}"

      - name: Rewrite version.js
        run: |
          cat > version.js <<EOF
          // Auto-generated by GitHub Actions
          window.NIGEBOT_VERSION = '${VERSION}';
          EOF

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload static site
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

