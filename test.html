<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NigeBot Man Cave</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #0f0f13; color: #f0f0f0; font-family: 'Segoe UI', sans-serif; padding: 24px; }
  h1 { color: #DC0000; font-size: 1.3rem; margin-bottom: 4px; }
  .subtitle { color: #888; font-size: 0.85rem; margin-bottom: 20px; }
  .tabs { display: flex; gap: 8px; margin-bottom: 20px; }
  .tab { background: #2a2a3a; border: none; color: #888; border-radius: 8px; padding: 9px 18px; cursor: pointer; font-size: 0.88rem; font-weight: 600; transition: all 0.2s; }
  .tab.active { background: #e10600; color: #fff; }
  .btn { background: #DC0000; color: #fff; border: none; border-radius: 8px; padding: 10px 20px; cursor: pointer; font-size: 0.9rem; font-weight: 600; }
  .btn:hover { background: #b00000; }
  .btn:disabled { background: #444; cursor: not-allowed; }
  .btn.green { background: #2a6a2a; }
  .btn.green:hover { background: #1a5a1a; }
  .card { background: #1a1a24; border-radius: 10px; padding: 16px; margin-bottom: 16px; border: 1px solid #2a2a3a; }
  .card h2 { font-size: 0.85rem; color: #888; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 12px; }
  .config-row { display: flex; gap: 12px; align-items: flex-end; flex-wrap: wrap; margin-bottom: 16px; }
  .config-row label { font-size: 0.72rem; color: #888; text-transform: uppercase; letter-spacing: 0.5px; display: block; margin-bottom: 4px; }
  .config-row select { background: #0f0f13; border: 1px solid #3a3a4a; border-radius: 8px; padding: 8px 12px; color: #fff; font-size: 0.88rem; }
  .test { display: flex; align-items: flex-start; gap: 10px; padding: 8px 0; border-bottom: 1px solid #1a1a24; font-size: 0.88rem; }
  .test:last-child { border-bottom: none; }
  .test-icon { font-size: 1rem; margin-top: 1px; min-width: 20px; }
  .test-name { flex: 1; }
  .test-detail { font-size: 0.75rem; color: #888; margin-top: 2px; }
  .test-status { font-size: 0.78rem; font-weight: 700; padding: 2px 8px; border-radius: 4px; white-space: nowrap; }
  .status-pass { background: #1a3a1a; color: #4caf50; }
  .status-fail { background: #3a1a1a; color: #ff6b6b; }
  .status-running { background: #1a2a3a; color: #4a9eff; }
  .status-pending { background: #2a2a3a; color: #888; }
  .summary { background: #1a1a24; border-radius: 10px; padding: 16px; margin-bottom: 16px; border: 1px solid #2a2a3a; display: flex; gap: 20px; align-items: center; }
  .summary-num { font-size: 2rem; font-weight: 800; }
  .summary-num.pass { color: #4caf50; }
  .summary-num.fail { color: #ff6b6b; }
  .summary-num.pending { color: #888; }
  .progress { background: #2a2a3a; border-radius: 4px; height: 6px; margin-bottom: 20px; overflow: hidden; }
  .progress-bar { background: #DC0000; height: 100%; border-radius: 4px; transition: width 0.3s; }
  .hidden { display: none !important; }
  .status-msg { font-size: 0.82rem; padding: 9px 13px; border-radius: 8px; margin-top: 10px; }
  .status-msg.info { background: #1a2a3a; color: #4a9eff; }
  .status-msg.error { background: #2a1a1a; color: #ff6b6b; }
  .status-msg.success { background: #1a2a1a; color: #4caf50; }
  .results-actual { display: flex; gap: 24px; margin-bottom: 20px; }
  .results-actual > div { flex: 1; }
  .section-title { font-size: 0.75rem; color: #888; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; padding-bottom: 6px; border-bottom: 1px solid #2a2a3a; }
  .pos-row { margin-bottom: 6px; font-size: 0.78rem; color: #888; }
  .preview-grid { display: grid; grid-template-columns: repeat(4,1fr); gap: 10px; }
  @media(max-width:750px) { .preview-grid { grid-template-columns: repeat(2,1fr); } }
  .preview-card { background: #0f0f13; border: 1px solid #2a2a3a; border-radius: 10px; padding: 12px; }
  .preview-card h3 { font-size: 0.9rem; font-weight: 700; color: #fff; margin-bottom: 8px; padding-bottom: 6px; border-bottom: 1px solid #2a2a3a; display: flex; justify-content: space-between; align-items: center; }
  .preview-card h3 span { font-size: 0.85rem; color: #e10600; font-weight: 800; }
  .pred-line { font-size: 0.78rem; padding: 3px 0; display: flex; justify-content: space-between; }
  .pred-line .pos-label { color: #666; }
  .pred-line .driver { font-weight: 600; }
  .pred-line.exact { color: #4caf50; }
  .pred-line.close { color: #ffaa44; }
  .pred-line.miss { color: #888; }
  .publish-row { display: flex; align-items: center; gap: 16px; margin-top: 16px; flex-wrap: wrap; }
  .last-published { font-size: 0.78rem; color: #888; }
  .last-published span { color: #4a9eff; }
</style>
</head>
<body>

<h1>🔧 NigeBot Man Cave</h1>
<p class="subtitle">Admin tools — v1.0.3</p>

<div class="tabs">
  <button class="tab active" onclick="showTab('tests',this)">🧪 Tests</button>
  <button class="tab" onclick="showTab('results',this)">📊 Results</button>
</div>

<!-- TESTS TAB -->
<div id="testsTab">
  <div class="config-row">
    <div>
      <label>Season</label>
      <select id="cfgSeason">
        <option value="2026">2026</option>
        <option value="2027">2027</option>
        <option value="2028">2028</option>
      </select>
    </div>
    <div>
      <label>Round (for API tests)</label>
      <select id="cfgRound">
        <option value="1">Round 1 — Australia</option>
        <option value="2">Round 2 — China</option>
        <option value="3">Round 3 — Japan</option>
      </select>
    </div>
    <button class="btn" onclick="runAll()">▶ Run All Tests</button>
  </div>

  <div class="progress"><div class="progress-bar" id="progressBar" style="width:0%"></div></div>

  <div class="summary">
    <div><div class="summary-num pending" id="passCount">—</div><div style="font-size:0.75rem;color:#888;text-transform:uppercase">Passed</div></div>
    <div><div class="summary-num fail" id="failCount">—</div><div style="font-size:0.75rem;color:#888;text-transform:uppercase">Failed</div></div>
    <div><div class="summary-num pending" id="pendingCount">—</div><div style="font-size:0.75rem;color:#888;text-transform:uppercase">Pending</div></div>
  </div>

  <div id="testGroups"></div>
</div>

<!-- RESULTS TAB -->
<div id="resultsTab" class="hidden">
  <div class="card">
    <h2>Fetch & Preview</h2>
    <div class="config-row">
      <div>
        <label>Season</label>
        <select id="resSeason">
          <option value="2026">2026</option>
          <option value="2027">2027</option>
          <option value="2028">2028</option>
        </select>
      </div>
      <div>
        <label>Round</label>
        <select id="resRound">
          <option value="1">Round 1 — Australia</option>
          <option value="2">Round 2 — China</option>
          <option value="3">Round 3 — Japan</option>
        </select>
      </div>
      <button class="btn" onclick="fetchPreview()">🔄 Fetch Results</button>
    </div>
    <div id="fetchMsg" class="status-msg info hidden"></div>
  </div>

  <div id="previewSection" class="hidden">
    <div class="card">
      <h2>Actual Results</h2>
      <div class="results-actual">
        <div>
          <div class="section-title">Qualifying</div>
          <div class="pos-row">P1 — <strong id="aqr1">—</strong></div>
          <div class="pos-row">P2 — <strong id="aqr2">—</strong></div>
          <div class="pos-row">P3 — <strong id="aqr3">—</strong></div>
        </div>
        <div>
          <div class="section-title">Race</div>
          <div class="pos-row">P1 — <strong id="arr1">—</strong></div>
          <div class="pos-row">P2 — <strong id="arr2">—</strong></div>
          <div class="pos-row">P3 — <strong id="arr3">—</strong></div>
        </div>
      </div>
    </div>

    <div class="card">
      <h2>Score Preview</h2>
      <div class="preview-grid" id="previewGrid"></div>
      <div class="publish-row">
        <button class="btn green" id="publishBtn" onclick="publishResults()">✅ Publish Results to NigeBot</button>
        <div class="last-published" id="lastPublished"></div>
      </div>
      <div id="publishMsg" class="status-msg hidden"></div>
    </div>
  </div>
</div>

<script>
const SB_URL = 'https://qkmukcuqosvlumsrqyay.supabase.co';
const SB_KEY = 'sb_publishable_dkJN0bxvkkW7JHXAvZ62XQ_tpxexARU';
const hdrs = { 'apikey': SB_KEY, 'Authorization': `Bearer ${SB_KEY}`, 'Content-Type': 'application/json', 'Prefer': 'return=representation' };
const QUALI_PTS = [12.5, 9, 7.5];
const RACE_PTS  = [25, 18, 15];
const PLAYERS   = ['Ollie','Tom','Tim','Ralph','Herbie','Dave','Jason'];

const DRIVER_CODES = {
  'VER':'Verstappen','NOR':'Norris','LEC':'Leclerc','PIA':'Piastri',
  'HAM':'Hamilton','RUS':'Russell','ANT':'Antonelli','ALO':'Alonso',
  'STR':'Stroll','GAS':'Gasly','OCO':'Ocon','HUL':'Hulkenberg',
  'MAG':'Magnussen','TSU':'Tsunoda','LAW':'Lawson','ALB':'Albon',
  'BEA':'Bearman','HAD':'Hadjar','DOO':'Doohan','BOR':'Bortoleto','COL':'Colapinto'
};

function norm(s) {
  if (!s) return '';
  const up = s.trim().toUpperCase();
  if (DRIVER_CODES[up]) return DRIVER_CODES[up].toLowerCase();
  return s.trim().toLowerCase();
}

function calcScore(preds, results, pts) {
  let total = 0;
  preds.forEach((pred, pi) => {
    if (!pred) return;
    const ei = results.findIndex(r => norm(r) === norm(pred));
    if (ei === pi) total += pts[pi];
    else if (ei !== -1 && Math.abs(ei - pi) === 1) total += pts[ei] / 2;
  });
  return total;
}

async function sbGet(path) {
  const r = await fetch(`${SB_URL}/rest/v1/${path}`, { headers: hdrs });
  if (!r.ok) throw new Error(`HTTP ${r.status}`);
  return r.json();
}

async function sbUpsert(path, body) {
  const h = { ...hdrs, 'Prefer': 'resolution=merge-duplicates,return=representation' };
  let url = `${SB_URL}/rest/v1/${path}`;
  if (path === 'predictions') url += '?on_conflict=player_name,race_id';
  if (path === 'scores') url += '?on_conflict=player_name,race_id';
  if (path === 'races') url += '?on_conflict=season,round';
  if (path === 'results') url += '?on_conflict=race_id';
  if (path === 'published_log') url += '?on_conflict=race_id';
  const r = await fetch(url, { method: 'POST', headers: h, body: JSON.stringify(body) });
  if (!r.ok) { const e = await r.json(); throw new Error(e.message || `HTTP ${r.status}`); }
  return r.json();
}

function showTab(tab, btn) {
  document.getElementById('testsTab').classList.toggle('hidden', tab !== 'tests');
  document.getElementById('resultsTab').classList.toggle('hidden', tab !== 'results');
  document.querySelectorAll('.tab').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  if (tab === 'results') loadLastPublished();
}

// ---- RESULTS TAB ----
let previewData = null;

async function loadLastPublished() {
  try {
    const rows = await sbGet('published_log?order=published_at.desc&limit=1');
    const el = document.getElementById('lastPublished');
    if (rows?.length) {
      const d = new Date(rows[0].published_at);
      el.innerHTML = `Last published: <span>${d.toLocaleString('en-GB')}</span> — ${rows[0].race_name}`;
    } else {
      el.innerHTML = 'No results published yet.';
    }
  } catch(e) {
    document.getElementById('lastPublished').textContent = '';
  }
}

async function fetchPreview() {
  const season = document.getElementById('resSeason').value;
  const round  = document.getElementById('resRound').value;
  const msg    = document.getElementById('fetchMsg');
  const section = document.getElementById('previewSection');
  section.classList.add('hidden');
  previewData = null;
  msg.className = 'status-msg info'; msg.textContent = '⏳ Fetching from Jolpica...'; msg.classList.remove('hidden');

  try {
    const [qRes, rRes] = await Promise.all([
      fetch(`https://api.jolpi.ca/ergast/f1/${season}/${round}/qualifying/`),
      fetch(`https://api.jolpi.ca/ergast/f1/${season}/${round}/results/`)
    ]);
    const qData = await qRes.json(), rData = await rRes.json();
    const qRace = qData.MRData.RaceTable.Races[0], rRace = rData.MRData.RaceTable.Races[0];
    if (!qRace || !rRace) { msg.className='status-msg error'; msg.textContent='⚠️ Results not available yet from Jolpica.'; return; }

    const qTop3 = qRace.QualifyingResults.slice(0,3).map(d => d.Driver.familyName);
    const rTop3 = rRace.Results.slice(0,3).map(d => d.Driver.familyName);

    ['qr1','qr2','qr3'].forEach((id,i) => document.getElementById('a'+id).textContent = qTop3[i]);
    ['rr1','rr2','rr3'].forEach((id,i) => document.getElementById('a'+id).textContent = rTop3[i]);

    const raceRows = await sbGet(`races?season=eq.${season}&round=eq.${round}`);
    const raceId   = raceRows?.[0]?.id;
    const raceName = raceRows?.[0]?.name || `Round ${round}`;

    let preds = [];
    if (raceId) preds = await sbGet(`predictions?race_id=eq.${raceId}`);

    const grid = document.getElementById('previewGrid');
    grid.innerHTML = PLAYERS.map(player => {
      const p = preds.find(x => x.player_name === player);
      const qPreds = p ? [p.quali_p1, p.quali_p2, p.quali_p3] : [null,null,null];
      const rPreds = p ? [p.race_p1,  p.race_p2,  p.race_p3]  : [null,null,null];
      const qScore = calcScore(qPreds, qTop3, QUALI_PTS);
      const rScore = calcScore(rPreds, rTop3, RACE_PTS);
      const total  = qScore + rScore;

      const predLine = (pred, actual, label) => {
        if (!pred) return `<div class="pred-line miss"><span class="pos-label">${label}</span><span class="driver">—</span></div>`;
        const ni = actual.findIndex(r => norm(r) === norm(pred));
        const pi = ['P1','P2','P3'].indexOf(label);
        let cls = 'miss';
        if (ni === pi) cls = 'exact';
        else if (ni !== -1 && Math.abs(ni - pi) === 1) cls = 'close';
        return `<div class="pred-line ${cls}"><span class="pos-label">${label}</span><span class="driver">${pred}</span></div>`;
      };

      return `<div class="preview-card">
        <h3>${player} <span>${total} pts</span></h3>
        <div class="section-title" style="font-size:0.68rem">Qualifying (${qScore})</div>
        ${predLine(qPreds[0],qTop3,'P1')}${predLine(qPreds[1],qTop3,'P2')}${predLine(qPreds[2],qTop3,'P3')}
        <div class="section-title" style="font-size:0.68rem;margin-top:8px">Race (${rScore})</div>
        ${predLine(rPreds[0],rTop3,'P1')}${predLine(rPreds[1],rTop3,'P2')}${predLine(rPreds[2],rTop3,'P3')}
      </div>`;
    }).join('');

    previewData = { season, round, raceId, raceName, qTop3, rTop3, preds };
    section.classList.remove('hidden');
    msg.className = 'status-msg success'; msg.textContent = `✅ Results fetched for ${raceName}`;
  } catch(e) {
    msg.className = 'status-msg error'; msg.textContent = `❌ ${e.message}`;
  }
}

async function publishResults() {
  if (!previewData) return;
  const { season, round, raceId, raceName, qTop3, rTop3, preds } = previewData;
  const btn = document.getElementById('publishBtn');
  const msg = document.getElementById('publishMsg');
  btn.disabled = true;
  msg.className = 'status-msg info'; msg.textContent = '⏳ Publishing...'; msg.classList.remove('hidden');

  try {
    let rid = raceId;
    if (!rid) {
      const upserted = await sbUpsert('races', { season: parseInt(season), round: parseInt(round), name: raceName, qualifying_at: new Date().toISOString(), race_at: new Date().toISOString() });
      rid = upserted?.[0]?.id;
    }
    if (!rid) throw new Error('Could not resolve race ID');

    await sbUpsert('results', {
      race_id: rid, quali_p1: qTop3[0], quali_p2: qTop3[1], quali_p3: qTop3[2],
      race_p1: rTop3[0], race_p2: rTop3[1], race_p3: rTop3[2],
      fetched_at: new Date().toISOString()
    });

    const scoreRows = PLAYERS.map(player => {
      const p = preds.find(x => x.player_name === player);
      const qPreds = p ? [p.quali_p1, p.quali_p2, p.quali_p3] : [null,null,null];
      const rPreds = p ? [p.race_p1,  p.race_p2,  p.race_p3]  : [null,null,null];
      const qs = calcScore(qPreds, qTop3, QUALI_PTS);
      const rs = calcScore(rPreds, rTop3, RACE_PTS);
      return { player_name: player, race_id: rid, quali_score: qs, race_score: rs, total_score: qs+rs, calculated_at: new Date().toISOString() };
    });
    await sbUpsert('scores', scoreRows);

    await sbUpsert('published_log', { race_id: rid, race_name: raceName, published_at: new Date().toISOString() });

    msg.className = 'status-msg success';
    msg.textContent = `✅ Results published for ${raceName}! Scores are now live in NigeBot.`;
    loadLastPublished();
  } catch(e) {
    msg.className = 'status-msg error'; msg.textContent = `❌ ${e.message}`;
    btn.disabled = false;
  }
}

// ---- TESTS TAB ----
const testGroups = [
  {
    name: 'Scoring Logic',
    tests: [
      { name: 'Exact match — Race P1', detail: 'Predict Verstappen P1, he finishes P1 → 25pts',
        run: () => { const s = calcScore(['Verstappen'],['Verstappen','Norris','Hamilton'],RACE_PTS); if(s!==25) throw new Error(`Expected 25, got ${s}`); }},
      { name: 'One position off — Race P1 predicted, finishes P2', detail: 'Predict Verstappen P1, he finishes P2 → half of P2 = 9pts',
        run: () => { const s = calcScore(['Verstappen'],['Norris','Verstappen','Hamilton'],RACE_PTS); if(s!==9) throw new Error(`Expected 9, got ${s}`); }},
      { name: 'Two positions off — zero points', detail: 'Predict Verstappen P1, he finishes P3 → 0pts',
        run: () => { const s = calcScore(['Verstappen'],['Norris','Hamilton','Verstappen'],RACE_PTS); if(s!==0) throw new Error(`Expected 0, got ${s}`); }},
      { name: 'Not in top 3 — zero points', detail: "Predict Alonso P1, he doesn't finish top 3 → 0pts",
        run: () => { const s = calcScore(['Alonso'],['Verstappen','Norris','Hamilton'],RACE_PTS); if(s!==0) throw new Error(`Expected 0, got ${s}`); }},
      { name: 'Driver code recognised — VER = Verstappen', detail: 'Predict VER P1, Verstappen finishes P1 → 25pts',
        run: () => { const s = calcScore(['VER'],['Verstappen','Norris','Hamilton'],RACE_PTS); if(s!==25) throw new Error(`Expected 25, got ${s}`); }},
      { name: 'Full qualifying prediction', detail: 'VER P1, PIA P2, HAM P3 — all exact → 29pts',
        run: () => { const s = calcScore(['VER','PIA','HAM'],['Verstappen','Piastri','Hamilton'],QUALI_PTS); if(s!==29) throw new Error(`Expected 29, got ${s}`); }},
      { name: "Full race prediction — Tim's Australia picks", detail: 'HAM P1, VER P2, ANT P3 vs actual results',
        run: () => { const s = calcScore(['HAM','VER','ANT'],['Hamilton','Verstappen','Antonelli'],RACE_PTS); if(s!==58) throw new Error(`Expected 58, got ${s}`); }},
    ]
  },
  {
    name: 'Supabase Connection',
    tests: [
      { name: 'Can connect to Supabase', detail: 'Basic read from races table', run: async () => { await sbGet('races?limit=1'); }},
      { name: 'Can read predictions table', detail: 'Fetch from predictions table', run: async () => { await sbGet('predictions?limit=1'); }},
      { name: 'Can read scores table', detail: 'Fetch from scores table', run: async () => { await sbGet('scores?limit=1'); }},
      { name: 'Can read results table', detail: 'Fetch from results table', run: async () => { await sbGet('results?limit=1'); }},
      { name: 'Can read published_log table', detail: 'Fetch from published_log table', run: async () => { await sbGet('published_log?limit=1'); }},
    ]
  },
  {
    name: 'Prediction Save & Update',
    tests: [
      { name: 'Can save a prediction', detail: 'Writes a test prediction to Supabase',
        run: async () => {
          const races = await sbGet('races?limit=1');
          if (!races.length) throw new Error('No races in DB — select a race first');
          const res = await sbUpsert('predictions', { race_id: races[0].id, player_name: '__test__', quali_p1:'VER', quali_p2:'NOR', quali_p3:'HAM', race_p1:'NOR', race_p2:'VER', race_p3:'LEC', submitted_at: new Date().toISOString() });
          if (!res || res.error) throw new Error(res?.error?.message || 'Save failed');
        }},
      { name: 'Can update an existing prediction', detail: 'Updates the test prediction without 409 conflict',
        run: async () => {
          const races = await sbGet('races?limit=1');
          if (!races.length) throw new Error('No races in DB');
          const res = await sbUpsert('predictions', { race_id: races[0].id, player_name: '__test__', quali_p1:'HAM', quali_p2:'PIA', quali_p3:'SAI', race_p1:'HAM', race_p2:'NOR', race_p3:'VER', submitted_at: new Date().toISOString() });
          if (!res || res.error) throw new Error(res?.error?.message || 'Update failed');
          if (res[0]?.quali_p1 !== 'HAM') throw new Error('Update did not persist');
        }},
      { name: 'Updated prediction reads back correctly', detail: 'Reads the test prediction and confirms the update',
        run: async () => {
          const races = await sbGet('races?limit=1');
          if (!races.length) throw new Error('No races in DB');
          const preds = await sbGet(`predictions?race_id=eq.${races[0].id}&player_name=eq.__test__`);
          if (!preds.length) throw new Error('Prediction not found');
          if (preds[0].quali_p1 !== 'HAM') throw new Error(`Expected HAM, got ${preds[0].quali_p1}`);
        }},
      { name: 'Clean up test data', detail: 'Removes the __test__ prediction from DB',
        run: async () => {
          const r = await fetch(`${SB_URL}/rest/v1/predictions?player_name=eq.__test__`, { method: 'DELETE', headers: hdrs });
          if (!r.ok) throw new Error(`Cleanup failed: HTTP ${r.status}`);
        }},
    ]
  },
  {
    name: 'F1 API — Jolpica',
    tests: [
      { name: 'Qualifying results available', detail: 'Fetches qualifying top 3 for selected season/round',
        run: async () => {
          const season = document.getElementById('cfgSeason').value, round = document.getElementById('cfgRound').value;
          const r = await fetch(`https://api.jolpi.ca/ergast/f1/${season}/${round}/qualifying/`);
          if (!r.ok) throw new Error(`HTTP ${r.status}`);
          const data = await r.json();
          const race = data.MRData.RaceTable.Races[0];
          if (!race) throw new Error('No data returned — results may not be published yet');
          const top3 = race.QualifyingResults.slice(0,3).map(d => d.Driver.familyName);
          if (top3.length < 3) throw new Error(`Only ${top3.length} results returned`);
          return `P1: ${top3[0]}, P2: ${top3[1]}, P3: ${top3[2]}`;
        }},
      { name: 'Race results available', detail: 'Fetches race top 3 for selected season/round',
        run: async () => {
          const season = document.getElementById('cfgSeason').value, round = document.getElementById('cfgRound').value;
          const r = await fetch(`https://api.jolpi.ca/ergast/f1/${season}/${round}/results/`);
          if (!r.ok) throw new Error(`HTTP ${r.status}`);
          const data = await r.json();
          const race = data.MRData.RaceTable.Races[0];
          if (!race) throw new Error('No data returned — results may not be published yet');
          const top3 = race.Results.slice(0,3).map(d => d.Driver.familyName);
          if (top3.length < 3) throw new Error(`Only ${top3.length} results returned`);
          return `P1: ${top3[0]}, P2: ${top3[1]}, P3: ${top3[2]}`;
        }},
      { name: 'Season schedule reachable', detail: 'Fetches the full season calendar',
        run: async () => {
          const season = document.getElementById('cfgSeason').value;
          const r = await fetch(`https://api.jolpi.ca/ergast/f1/${season}/`);
          if (!r.ok) throw new Error(`HTTP ${r.status}`);
          const data = await r.json();
          const count = data.MRData.RaceTable.Races.length;
          if (!count) throw new Error('No races returned');
          return `${count} races found`;
        }},
    ]
  }
];

function renderGroups() {
  document.getElementById('testGroups').innerHTML = testGroups.map((g, gi) => `
    <div class="card">
      <h2>${g.name}</h2>
      ${g.tests.map((t, ti) => `
        <div class="test" id="test_${gi}_${ti}">
          <div class="test-icon" id="icon_${gi}_${ti}">⏳</div>
          <div class="test-name">
            <div>${t.name}</div>
            <div class="test-detail" id="detail_${gi}_${ti}">${t.detail}</div>
          </div>
          <div class="test-status status-pending" id="status_${gi}_${ti}">Pending</div>
        </div>`).join('')}
    </div>`).join('');
}

async function runAll() {
  renderGroups();
  let passed = 0, failed = 0;
  const total = testGroups.reduce((a,g) => a+g.tests.length, 0);
  let done = 0;
  for (let gi = 0; gi < testGroups.length; gi++) {
    for (let ti = 0; ti < testGroups[gi].tests.length; ti++) {
      const t = testGroups[gi].tests[ti];
      const statusEl = document.getElementById(`status_${gi}_${ti}`);
      const iconEl   = document.getElementById(`icon_${gi}_${ti}`);
      const detailEl = document.getElementById(`detail_${gi}_${ti}`);
      statusEl.className = 'test-status status-running'; statusEl.textContent = 'Running…'; iconEl.textContent = '⏳';
      try {
        const extra = await t.run();
        statusEl.className = 'test-status status-pass'; statusEl.textContent = 'Pass'; iconEl.textContent = '✅';
        if (extra) { detailEl.textContent = `✅ ${extra}`; detailEl.style.color = '#4caf50'; }
        passed++;
      } catch(e) {
        statusEl.className = 'test-status status-fail'; statusEl.textContent = 'Fail'; iconEl.textContent = '❌';
        detailEl.textContent = `❌ ${e.message}`; detailEl.style.color = '#ff6b6b';
        failed++;
      }
      done++;
      document.getElementById('progressBar').style.width = `${(done/total)*100}%`;
      document.getElementById('passCount').textContent = passed;
      document.getElementById('failCount').textContent = failed;
      document.getElementById('pendingCount').textContent = total - done;
      await new Promise(r => setTimeout(r, 100));
    }
  }
  document.getElementById('passCount').className = 'summary-num pass';
  document.getElementById('progressBar').style.background = failed > 0 ? '#ff6b6b' : '#4caf50';
}

renderGroups();
</script>
</body>
</html>
